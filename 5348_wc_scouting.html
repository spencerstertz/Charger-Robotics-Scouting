<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5348 Scout Form</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#001f3f;
  color:#222;
}
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:16px;
}
.card{
  background:white;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
label{
  display:block;
  font-weight:600;
  margin-bottom:8px;
}
input[type=text],
input[type=number],
textarea,
select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
  margin-bottom:12px;
  font-size:16px;
}
textarea{
  min-height:80px;
  resize:vertical;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.radio-group{
  display:flex;
  flex-wrap:wrap;
  gap:10px 18px;
  margin-bottom:12px;
}
.radio-group label{
  font-weight:normal;
  display:flex;
  align-items:center;
  gap:6px;
  margin:0;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button{
  padding:12px 16px;
  border:0;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
.primary{
  background:#345cb3;
  color:white;
}
.primary:hover{
  background:#001633;
}
.secondary{
  background:#ddd;
}
.status{
  margin:10px 0;
  font-weight:600;
}
.small{
  font-size:14px;
  color:#555;
}
@media (max-width:700px){
  .row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="card">

<div class="small">Offline capable. Saves unsent entries on this device.</div>
<div class="status" id="status">Ready</div>
<div class="small" id="queueCount"></div>
</div>

</datalist>
</div>

</div>

<div class="row">

<div>
<label>What match number are you scouting?</label>
<input type="number" id="matchNumber" step="1" min="1" required>
</div>

<div>
<label>Is your robot on the field?</label>
<div class="radio-group">
<label><input type="radio" name="onField" value="Yes" required> Yes</label>
<label><input type="radio" name="onField" value="No"> No</label>
</div>
</div>

</div>

</div>

<div class="card">

<h2>Auto</h2>

<label>What auto zones did your team enter? (Companion Sheet)</label>
<div class="radio-group">
<label><input type="radio" name="autoZonesPreset" value="They didn't enter any of the zones on the companion sheet" required> They didn't enter any of the zones on the companion sheet</label>
<label><input type="radio" name="autoZonesPreset" value="Other"> Other:</label>
</div>
<input type="text" id="autoZonesOther" placeholder="Fill in zones only if other">

<label>Did they shoot their preload before entering the neutral zone?</label>
<div class="radio-group">
<label><input type="radio" name="preloadBeforeNeutral" value="They never entered the neutral zone." required> They never entered the neutral zone.</label>
<label><input type="radio" name="preloadBeforeNeutral" value="Yes"> Yes</label>
<label><input type="radio" name="preloadBeforeNeutral" value="No"> No</label>
</div>

<div class="row">

<div>
<label>How many fuel did they score in auto?</label>
<input type="number" id="autoFuel" required>
</div>

<div>
<label>Did they climb in auto?</label>
<div class="radio-group">
<label><input type="radio" name="autoClimb" value="Yes" required> Yes</label>
<label><input type="radio" name="autoClimb" value="No"> No</label>
<label><input type="radio" name="autoClimb" value="Tried but Failed"> Tried but Failed</label>
</div>
</div>

</div>

<label>If they failed: why?</label>
<input type="text" id="autoFailWhy">

<label>Other Notes for Auto</label>
<div class="radio-group">
<label><input type="radio" name="autoNotesPreset" value="They didn't have an auto"> They didn't have an auto</label>
<label><input type="radio" name="autoNotesPreset" value="They only shot preload and didn't move"> They only shot preload and didn't move</label>
<label><input type="radio" name="autoNotesPreset" value="Other"> Other</label>
</div>
<input type="text" id="autoNotesOther">

</div>

<div class="card">

<h2>Teleop</h2>

<div class="row">

<div>
<label>How many fuel did they score in teleop?</label>
<input type="number" id="teleopFuel" required>
</div>

<div>
<label>Did they die?</label>
<div class="radio-group">
<label><input type="radio" name="died" value="Yes" required> Yes</label>
<label><input type="radio" name="died" value="No"> No</label>
</div>
</div>

</div>

<label>Describe how they died if applicable</label>
<input type="text" id="diedDescription">

<label>Other notes for teleop</label>
<textarea id="teleopNotes"></textarea>

</div>

<div class="card actions">
<button type="submit" class="primary">Submit</button>
<button type="button" class="secondary" id="saveOfflineBtn">Save Offline</button>
<button type="button" class="secondary" id="syncBtn">Sync Pending</button>
<button type="button" class="secondary" id="clearBtn">Clear Form</button>
</div>

</form>

</div>

<script>

const WEB_APP_URL="PASTE_WEB_APP_URL_HERE";
const QUEUE_KEY="frcScoutPendingQueue";

const form=document.getElementById("scoutForm");
const statusEl=document.getElementById("status");
const queueCountEl=document.getElementById("queueCount");

function setStatus(t){
  statusEl.textContent=t;
}

function getRadioValue(name){
  const checked=document.querySelector(`input[name="${name}"]:checked`);
  return checked?checked.value:"";
}

function getAutoZones(){
  const preset=getRadioValue("autoZonesPreset");
  const other=document.getElementById("autoZonesOther").value;
  return preset==="Other"?other:preset;
}

function getAutoNotes(){
  const preset=getRadioValue("autoNotesPreset");
  const other=document.getElementById("autoNotesOther").value;
  return preset==="Other"?other:preset;
}

function getPayload(){
  return{
    name:document.getElementById("name").value,
    team:document.getElementById("team").value,
    matchNumber:document.getElementById("matchNumber").value,
    onField:getRadioValue("onField"),

    autoZones:getAutoZones(),
    preloadBeforeNeutral:getRadioValue("preloadBeforeNeutral"),
    autoFuel:document.getElementById("autoFuel").value,
    autoClimb:getRadioValue("autoClimb"),
    autoFailWhy:document.getElementById("autoFailWhy").value,
    autoNotes:getAutoNotes(),

    teleopFuel:document.getElementById("teleopFuel").value,
    died:getRadioValue("died"),
    diedDescription:document.getElementById("diedDescription").value,
    teleopNotes:document.getElementById("teleopNotes").value
  };
}

function getQueue(){
  return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]");
}

function setQueue(q){
  localStorage.setItem(QUEUE_KEY,JSON.stringify(q));
  renderQueueCount();
}

function addToQueue(payload){
  const q=getQueue();
  q.push(payload);
  setQueue(q);
}

function renderQueueCount(){
  queueCountEl.textContent="Pending unsynced entries: "+getQueue().length;
}

async function sendPayload(payload){
  const response=await fetch(WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload)
  });

  const text=await response.text();
  const data=JSON.parse(text);

  if(!data.ok){
    throw new Error("Submit failed");
  }
}

async function syncQueue(){
  const q=getQueue();
  if(!q.length){
    setStatus("No pending entries.");
    return;
  }

  const remaining=[];

  for(const item of q){
    try{
      await sendPayload(item);
    }catch(err){
      remaining.push(item);
    }
  }

  setQueue(remaining);

  if(!remaining.length){
    setStatus("All pending entries synced.");
  }else{
    setStatus(remaining.length+" still pending.");
  }
}

function clearForm(){
  form.reset();
}

form.addEventListener("submit",async function(e){
  e.preventDefault();

  const payload=getPayload();

  if(
    !payload.name ||
    !payload.team ||
    !payload.matchNumber ||
    !payload.onField ||
    !payload.autoZones ||
    !payload.preloadBeforeNeutral ||
    payload.autoFuel==="" ||
    !payload.autoClimb ||
    payload.teleopFuel==="" ||
    !payload.died
  ){
    setStatus("Missing required fields.");
    return;
  }

  try{
    await sendPayload(payload);
    setStatus("Submitted.");
    clearForm();
    await syncQueue();
  }catch(err){
    addToQueue(payload);
    setStatus("Saved offline.");
  }
});

document.getElementById("saveOfflineBtn").onclick=function(){
  addToQueue(getPayload());
  setStatus("Saved locally.");
};

document.getElementById("syncBtn").onclick=syncQueue;
document.getElementById("clearBtn").onclick=clearForm;

renderQueueCount();

</script>

</body>
</html>
